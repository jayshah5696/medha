<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- Medha icon: bar chart forming an "M" shape -->
  <!-- Clean, minimal — works at all sizes from 16px favicon to 512px dock icon -->

  <!-- Dark background circle for contrast -->
  <circle cx="80" cy="80" r="72" fill="#0a0a0b"/>

  <!-- Bar chart bars — heights form an M shape -->
  <rect x="32" y="82" width="16" height="32" rx="2" fill="#00D8FF"/>
  <rect x="54" y="52" width="16" height="62" rx="2" fill="#00D8FF"/>
  <rect x="76" y="32" width="16" height="82" rx="2" fill="#00D8FF"/>
  <rect x="98" y="58" width="16" height="56" rx="2" fill="#00D8FF"/>
  <rect x="120" y="46" width="16" height="68" rx="2" fill="#00D8FF"/>
</svg>
