<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- Medha icon: hexagon + Devanagari म (icon only, no wordmark) -->
  <!-- For favicon and dock icon use -->

  <!-- Hexagon outline -->
  <polygon
    points="80,8 148,40 148,104 80,136 12,104 12,40"
    fill="none"
    stroke="#00D8FF"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Devanagari म centered -->
  <text
    x="80"
    y="80"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Noto Sans Devanagari', 'Devanagari MT', sans-serif"
    font-size="64"
    font-weight="400"
    fill="#00D8FF"
  >म</text>
</svg>
